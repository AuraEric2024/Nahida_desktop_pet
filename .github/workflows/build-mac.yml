# Mac 版自动构建工作流
# 推送代码到 GitHub 后，在 Actions 页面手动触发或推送 mac/ 相关改动时自动触发
# 构建完成后在 artifact 下载 NahidaPet.app

name: Build Mac App

on:
  # 推送到 main/master 分支且 mac 相关文件改动时自动触发
  push:
    branches: [main, master]
    paths:
      - "mac/**"
      - "Nahida_model/**"
      - "audio/**"
      - ".github/workflows/build-mac.yml"
  # 支持手动触发（推荐用这个）
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r mac/requirements.txt

      # 4. 用 py2app 打包
      - name: Build .app
        working-directory: mac
        run: |
          # 清理旧构建（避免缓存问题）
          rm -rf build dist
          python setup.py py2app

      # 5. 压缩 .app 为 zip 方便下载
      - name: Zip the app
        run: |
          cd mac/dist
          ditto -c -k --keepParent NahidaPet.app NahidaPet-mac.zip

      # 6. 上传 artifact（构建完成后在 Actions 页面下载）
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NahidaPet-mac
          path: mac/dist/NahidaPet-mac.zip
          retention-days: 30  # 保留 30 天
